{% extends "base.html" %}

{% block title %}Search History{% endblock %}

{% block header %}{% endblock %}

{% block content %}
    <h2>Search History</h2>
    <ul>
        {% for search in searches %}
            <li>
                <strong>{{ search['origin'] }}</strong> to 
                <strong>{{ search['destination'] }}</strong> on 
                <strong>{{ search['date'] }}</strong>
            </li>
        {% endfor %}
    </ul>
{% endblock %}
